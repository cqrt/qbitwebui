name: Sync upstream

on:
  schedule:
    - cron: '0 3 * * *' # daily at 3am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/Maciejonos/qbitwebui.git
          git fetch upstream

      - name: Record pre-merge SHA
        id: before
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Merge upstream
        run: git merge upstream/master --no-edit

      - name: Check for new commits
        id: changed
        run: |
          if [ "$(git rev-parse HEAD)" != "${{ steps.before.outputs.sha }}" ]; then
            echo "detected=true" >> $GITHUB_OUTPUT
          else
            echo "detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump patch version and tag
        if: steps.changed.outputs.detected == 'true'
        run: |
          npm version patch -m "chore: bump version to %s"

      - name: Push commit and tag
        if: steps.changed.outputs.detected == 'true'
        run: |
          git push origin master
          git push origin "$(git describe --tags --abbrev=0)"

      - name: Push master (no upstream changes)
        if: steps.changed.outputs.detected == 'false'
        run: git push origin master
